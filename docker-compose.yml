# Sakura AI - Docker Compose（容器化部署配置）
# 
# 📦 镜像来源说明：
#   - 默认使用阿里云镜像（sakura-ai:latest）
# 
# 🚀 使用方法：
#   - cp .env.example .env
#   - docker compose -f docker-compose.yml pull
#   - docker compose -f docker-compose.yml up -d

networks:
  sakura-network:
    # 使用默认的 bridge 网络
    # external: true
    # name: bridge
    # 使用自定义的 bridge 网络
    driver: bridge
    ipam:
      config:
        - subnet: 192.169.0.0/24    # 子网范围
          gateway: 192.169.0.1      # 网关地址

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: sakura-ai-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: sakura_ai
      MYSQL_USER: sakura_ai
      MYSQL_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./config/mysql-init:/docker-entrypoint-initdb.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - sakura-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 60s
    profiles:
      - core
      - ""  # 空字符串表示默认 profile

  # Sakura AI 应用服务
  sakura-ai:
    # 本地构建镜像（开发环境）
    # build:
    #   context: .
    #   dockerfile: Dockerfile.debian
    # image: ${LOCAL_IMAGE_NAME:-sakura-ai}:${LOCAL_IMAGE_TAG:-latest}
    # 阿里云镜像（生产环境）
    image: crpi-f4c88g7tayj7jwle.cn-hangzhou.personal.cr.aliyuncs.com/sakura-ai/sakura-ai:latest
    container_name: sakura-ai-app
    restart: unless-stopped
    # 容器直接使用宿主机的 3001 和 5173 端口
    networks:
      - sakura-network
    ports:
      - "3001:3001"
      - "5173:5173"
    # 🔥 添加 extra_hosts 让容器通过宿主机访问内网 IP
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # 数据库配置（bridge 模式下使用服务名）
      DATABASE_URL: mysql://sakura_ai:${DB_PASSWORD}@mysql:3306/sakura_ai
      
      # 应用配置
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      SERVER_HOST: 0.0.0.0
      BASE_URL: ${BASE_URL:-}
      
      # Vite 前端配置（确保监听所有网络接口）
      VITE_HOST: 0.0.0.0
      VITE_PORT: 5173
      
      # JWT 配置
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      
      # Playwright 配置
      PLAYWRIGHT_HEADLESS: ${PLAYWRIGHT_HEADLESS:-true}
      PLAYWRIGHT_BROWSER: ${PLAYWRIGHT_BROWSER:-chromium}
      PLAYWRIGHT_PRE_INSTALL_BROWSER: ${PLAYWRIGHT_PRE_INSTALL_BROWSER:-true}
      # PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
      # Debian 系统 Chromium 路径是 /usr/bin/chromium
      # PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH: /usr/bin/chromium

      # 测试执行配置
      TEST_TIMEOUT: ${TEST_TIMEOUT:-600000}
      MAX_CONCURRENT_TESTS: ${MAX_CONCURRENT_TESTS:-6}
      
      # MCP 浏览器配置
      MCP_BROWSER_FULLSCREEN: ${MCP_BROWSER_FULLSCREEN:-true}
      MCP_BROWSER_MAXIMIZED: ${MCP_BROWSER_MAXIMIZED:-true}
      MCP_BROWSER_WINDOW_SIZE: ${MCP_BROWSER_WINDOW_SIZE:-1920,1080}
      
      # AI 配置
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      DEFAULT_MODEL: ${DEFAULT_MODEL:-openai/gpt-4o}
      DEFAULT_TEMPERATURE: ${DEFAULT_TEMPERATURE:-0.3}
      DEFAULT_MAX_TOKENS: ${DEFAULT_MAX_TOKENS:-4000}
      
      # 本地 Gemini API 配置（可选）
      GEMINI_LOCAL_BASE_URL: ${GEMINI_LOCAL_BASE_URL:-}
      GEMINI_LOCAL_API_KEY: ${GEMINI_LOCAL_API_KEY:-}
      
      # 代理配置
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      
      # RAG 配置（可选）
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-aliyun}
      EMBEDDING_API_BASE_URL: ${EMBEDDING_API_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-v4}
      
      # OpenClaw 内部访问地址（容器间通信用服务名，宿主机直接运行时留空用 localhost）
      OPENCLAW_INTERNAL_HOST: openclaw-gateway
      # OpenClaw 配置目录（容器内挂载路径，用于读写 openclaw.json）
      OPENCLAW_CONFIG_DIR: /app/.openclaw
      
      # 日志配置
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FULL_PROMPT: ${LOG_FULL_PROMPT:-false}
    volumes:
      # 持久化数据
      - ./logs:/app/logs
      - ./docs:/app/docs
      - ./uploads:/app/uploads
      - ./artifacts:/app/artifacts
      - ./screenshots:/app/screenshots
      - ./midscene_run:/app/midscene_run
      # 挂载 Docker socket，让容器内可以调用宿主机 Docker（管理 openclaw 容器）
      - /var/run/docker.sock:/var/run/docker.sock
      # 挂载 OpenClaw 配置目录，用于读取/写入 openclaw.json 配置
      - ${OPENCLAW_CONFIG_DIR:-./.openclaw}:/app/.openclaw
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 120s
    profiles:
      - core
      - ""  # 空字符串表示默认 profile

  # Qdrant 向量数据库（可选 - RAG 功能）
  # docker compose --profile rag up -d
  qdrant:
    image: qdrant/qdrant:latest
    container_name: sakura-ai-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - sakura-network
    profiles:
      - rag

  # OpenClaw（官方版）
  # 启动方式: docker compose --profile openclaw --profile nginx up -d
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    container_name: sakura-ai-openclaw
    # 以 root 运行，确保对挂载卷有写入权限（生成证书、写配置等）
    user: "0:0"
    environment:
      HOME: /root
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      OPENCLAW_GATEWAY_TLS_CERT: /root/.openclaw/certs/cert.pem
      OPENCLAW_GATEWAY_TLS_KEY: /root/.openclaw/certs/key.pem
      # 禁用 Bonjour (mDNS) 服务，Docker 容器内无法正常工作
      OPENCLAW_GATEWAY_DISABLE_BONJOUR: "true"
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-./.openclaw}:/root/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-./.openclaw/workspace}:/root/.openclaw/workspace
      # 🔧 extensions 单独用 named volume，解决 Windows Docker Desktop 下跨挂载点 rename() 失败问题
      # 原因：openclaw 安装插件时先写 /tmp 再 rename 到 extensions，bind mount 在 Windows WSL2/virtiofs
      #       下跨文件系统 rename 报 EACCES；Linux 下 Node.js 会自动 fallback 到 copy+unlink 不受影响
      # 其他目录（certs/logs/devices 等）均为普通文件写入，不走 rename 流程，bind mount 无问题
      - openclaw-extensions:/root/.openclaw/extensions
      # 移除只读挂载，允许初始化脚本生成证书
      # - ${OPENCLAW_CONFIG_DIR:-./.openclaw}/certs:/root/.openclaw/certs:ro
      # 挂载初始化脚本（配置文件 + SSL 证书自动生成）
      - ./scripts/init-openclaw.sh:/init-openclaw.sh:ro
      ## Uncomment the lines below to enable sandbox isolation
      ## (agents.defaults.sandbox). Requires Docker CLI in the image
      ## (build with --build-arg OPENCLAW_INSTALL_DOCKER_CLI=1) or use
      ## docker-setup.sh with OPENCLAW_SANDBOX=1 for automated setup.
      ## Set DOCKER_GID to the host's docker group GID (run: stat -c '%g' /var/run/docker.sock).
      # - /var/run/docker.sock:/var/run/docker.sock
    # group_add:
    #   - "${DOCKER_GID:-999}"
    networks:
      - sakura-network
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "/bin/bash",
        "-c",
        "tr -d '\\r' < /init-openclaw.sh > /tmp/init-openclaw.sh && sed '1s/^\\xef\\xbb\\xbf//' /tmp/init-openclaw.sh > /tmp/init-clean.sh && bash /tmp/init-clean.sh node dist/index.js gateway --bind lan --port 18789",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    profiles:
      - openclaw

  # openclaw-cli:
  #   image: ${OPENCLAW_IMAGE:-openclaw:local}
  #   container_name: sakura-ai-openclaw-cli
  #   networks:
  #     - sakura-network
  #   cap_drop:
  #     - NET_RAW
  #     - NET_ADMIN
