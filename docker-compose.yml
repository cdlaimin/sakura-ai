  #     OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
  #     BROWSER: echo
  #     CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
  #     CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
  #     CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
  #   volumes:
  #     - ${OPENCLAW_CONFIG_DIR:-./.openclaw}:/home/node/.openclaw
  #     - ${OPENCLAW_WORKSPACE_DIR:-./.openclaw/workspace}:/home/node/.openclaw/workspace
  #   stdin_open: true
  #   tty: true
  #   init: true
  #   entrypoint: ["node", "dist/index.js"]
  #   profiles:
  #     - openclaw

  # OpenClaw (汉化版)
  # 启动方式: docker compose --profile openclaw --profile nginx up -d
  # openclaw-gateway:
  #   # 官方本地使用 openclaw:local，海外使用 ghcr.io/openclaw/openclaw:latest
  #   # 汉化国内使用 1186258278/openclaw-zh:latest，海外使用 ghcr.io/1186258278/openclaw-zh:latest (latest 稳定版，nightly 最新版)
  #   image: ${OPENCLAW_IMAGE:-openclaw:local}
  #   container_name: sakura-ai-openclaw
  #   ports:
  #     - "18789:18789"
  #   networks:
  #     - sakura-network  
  #   volumes:
  #     # 数据持久化（注意：容器以 root 用户运行，配置存储在 /root/.openclaw）
  #     - ${OPENCLAW_CONFIG_DIR:-./.openclaw}:/root/.openclaw
  #     - ${OPENCLAW_WORKSPACE_DIR:-./.openclaw/workspace}:/root/.openclaw/workspace
  #     - ./scripts/init-openclaw.sh:/init-openclaw.sh:ro
  #   environment:
  #     # 访问令牌（推荐设置，用于 Dashboard 认证）
  #     # 建议创建 .env 文件设置: OPENCLAW_GATEWAY_TOKEN=your-secure-token
  #     - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
  #     # 跳过首次初始化检查（仅高级用户使用）
  #     # - OPENCLAW_SKIP_SETUP=1
  #     - OPENCLAW_GATEWAY_TLS_CERT=./.openclaw/certs/cert.pem
  #     - OPENCLAW_GATEWAY_TLS_KEY:=./.openclaw/certs/key.pem
  #   restart: unless-stopped
  #   # 默认启动 gateway（首次需要初始化，见下方说明）
  #   command:
  #     [
  #       "/bin/bash",
  #       "/init-openclaw.sh",
  #       "openclaw",
  #       "gateway",
  #       "run",
  #       "--allow-unconfigured",
  #     ]
  #   healthcheck:
  #     test:
  #       [
  #         "CMD",
  #         "node",
  #         "-e",
  #         "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
  #       ]
  #     interval: 30s
  #     timeout: 5s
  #     retries: 5
  #     start_period: 20s
  #   profiles:
  #     - openclaw
    # 
    # ========== 首次使用说明 ==========
    # 
    # 方式 1: 一键脚本（推荐）
    #   curl -fsSL https://cdn.jsdelivr.net/gh/1186258278/OpenClawChineseTranslation@main/docker-deploy.sh | bash
    #
    # 方式 2: 手动初始化
    #   docker-compose exec openclaw openclaw setup
    #   docker-compose exec openclaw openclaw config set gateway.mode local
    #   docker-compose restart
    #
    # ========== 远程访问配置 ==========
    # 
    # 如果需要从其他设备访问（非 localhost）：
    #
    # 1. 配置绑定和认证
    #   docker-compose exec openclaw openclaw config set gateway.bind lan
    #   docker-compose exec openclaw openclaw config set gateway.auth.token YOUR_TOKEN
    #   docker-compose restart
    #
    # 2. 访问 http://服务器IP:18789，在 Dashboard 输入 token 连接
    #
    # ========== 反向代理配置（Nginx 等）==========
    #
    # 如果使用 Nginx 反向代理，需要配置信任代理地址：
    #   docker-compose exec openclaw openclaw config set gateway.trustedProxies '["127.0.0.1", "::1"]'
    #   docker-compose restart
    #
    # 详细配置请参考 README.md 中的反向代理章节。
    #
    # ========== 常见错误排查 ==========
    #
    # 1. "Gateway auth is set to token, but no token is configured"
    #    → 设置 token: docker-compose exec openclaw openclaw config set gateway.auth.token YOUR_TOKEN
    #
    # 2. "Missing config. Run openclaw setup"
    #    → 初始化: docker-compose exec openclaw openclaw setup
    #
    # 3. "control ui requires HTTPS or localhost"
    #    → 使用 Token 认证或配置 HTTPS 反向代理
    #
    # 4. "Proxy headers detected from untrusted address"
    #    → 设置信任代理: docker-compose exec openclaw openclaw config set gateway.trustedProxies '["127.0.0.1"]'
    #

  # Nginx 反向代理（可选）
  # 启动方式: docker compose --profile nginx up -d
  # 注意：Nginx 在 18790 端口提供 HTTPS 代理到 OpenClaw Gateway 的 18789 端口
  nginx:
    image: nginx:alpine
    container_name: sakura-ai-nginx
    restart: unless-stopped
    ports:
      - "443:443"  # OpenClaw Gateway HTTPS 代理端口（避免与 18789 冲突）
    volumes:
      # 站点配置文件（HTTP 反向代理配置）
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # 日志目录（便于调试和监控）
      - nginx-logs:/var/log/nginx
      # SSL 证书目录（必需，用于 HTTPS）
      - ${OPENCLAW_CONFIG_DIR:-./.openclaw}/certs:/etc/nginx/certs:ro
    depends_on:
      openclaw-gateway:
        condition: service_healthy
    networks:
      - sakura-network
    profiles:
      - nginx
      - openclaw  # 添加 openclaw profile，与 OpenClaw 一起启动

volumes:
  mysql-data:
    driver: local
  qdrant-data:
    driver: local
  nginx-logs:
    driver: local
  # openclaw 插件目录使用 named volume，避免 Windows bind mount 跨文件系统 rename 失败
  openclaw-extensions:
    driver: local
